<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>新加坡四天旅遊行程管理</title>
  <meta name="theme-color" content="#ff9ab5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="新加坡行程" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/app-icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icons/app-icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Singapore Trip Planner</p>
        <h1><span aria-hidden="true">✈️</span> 新加坡四天旅遊行程</h1>
      </div>
    </header>

    <main>
      <section class="tabs-panel" aria-label="天數分頁">
        <div class="day-tabs" id="dayTabs" role="tablist"></div>
      </section>

      <section class="day-view" id="dayView" aria-live="polite"></section>
    </main>
  </div>

  <dialog class="modal" id="itemModal">
    <form class="modal-card" id="itemForm" method="dialog">
      <div class="modal-header">
        <div>
          <p class="eyebrow">Itinerary Item</p>
          <h2 id="modalTitle">編輯行程</h2>
        </div>
        <button class="icon-button" id="closeModalBtn" type="button" aria-label="關閉">×</button>
      </div>

      <div class="form-grid">
        <label>
          時間
          <input id="timeInput" name="time" type="time" required />
        </label>
        <label>
          地點名稱
          <input id="placeInput" name="place" type="text" required placeholder="例如：魚尾獅公園" />
        </label>
        <label class="full">
          行程說明
          <textarea id="descriptionInput" name="description" rows="3" placeholder="交通、活動內容、訂位資訊等"></textarea>
        </label>
        <label class="full">
          備註
          <textarea id="notesInput" name="notes" rows="3" placeholder="票券、預算、注意事項等"></textarea>
        </label>
      </div>

      <div class="modal-actions">
        <button class="ghost-button" id="cancelModalBtn" type="button">取消</button>
        <button class="primary-button" type="submit">儲存</button>
      </div>
    </form>
  </dialog>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
